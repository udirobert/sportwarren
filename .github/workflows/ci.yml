name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run test

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build
        env:
          DISABLE_SENTRY_BUILD: "true"
          NODE_OPTIONS: "--max-old-space-size=8192"

  smoke-test:
    name: Smoke Test (artifact build + server boot)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build deployment artifact
        run: bash scripts/build-runtime-artifact.sh
        env:
          DISABLE_SENTRY_BUILD: "true"
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Boot standalone server and run health check
        run: |
          ARTIFACT_DIR="$(pwd)/.deploy-artifact/.next/standalone"
          echo "Artifact directory: $ARTIFACT_DIR"

          # sharp's native addon dlopen()s libvips as a genuinely separate
          # shared object (unlike @resvg/resvg-js's statically-linked Rust
          # binary), and the OS dynamic linker doesn't go through Node's own
          # module resolution to find it — LD_LIBRARY_PATH is what points it
          # at the artifact's bundled copy. See build-runtime-artifact.sh's
          # validation step, which needs the identical export.
          export LD_LIBRARY_PATH="$ARTIFACT_DIR/node_modules/@img/sharp-libvips-linux-x64/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

          # Start server in background
          cd "$ARTIFACT_DIR"
          node server.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Ensure server is killed on script exit (cleanup for both success and failure)
          cleanup() { kill $SERVER_PID 2>/dev/null || true; }
          trap cleanup EXIT

          # This artifact is API-only: build-runtime-artifact.sh deliberately
          # prunes every non-`/api` app route (Vercel serves the frontend), so
          # `/` has no page.js here and can never be used as a boot probe —
          # polling it always 500s regardless of artifact health. Poll
          # /api/health instead. CI has no live Postgres, so it correctly
          # returns 503 (not 200) once booted — that 503 IS the proof the
          # server booted, compiled, and routed the request; only "000"
          # (curl's own sentinel for connection-refused/no-response) means
          # the server never came up.
          SERVER_UP=false
          HEALTH="{}"
          for i in $(seq 1 15); do
            sleep 2
            # `|| true` is required: under GH Actions' default `set -e`, a
            # failing command inside a plain `var=$(...)` assignment aborts
            # the step immediately (bash does not suppress -e for assignment
            # substitutions) — without it, the very first iteration (curl
            # exit 7, connection refused, while the server is still starting)
            # would kill the whole retry loop. curl's own `-w` trailer already
            # writes a literal "000" for %{http_code} when no response was
            # received, so no separate `|| echo "000"` fallback is needed —
            # one WAS here before and it produced a mangled "000000" by
            # appending onto curl's own partial output instead of replacing it.
            RESPONSE=$(curl -s --max-time 5 -w '\n%{http_code}' http://localhost:3000/api/health 2>/dev/null) || true
            STATUS=$(echo "$RESPONSE" | tail -1)
            HEALTH=$(echo "$RESPONSE" | sed '$d')
            if [ "$STATUS" != "000" ]; then
              SERVER_UP=true
              echo "✅ Server responding on attempt $i (HTTP $STATUS)"
              break
            fi
            echo "⏳ Attempt $i/15 — HTTP $STATUS"
          done

          echo "🩺 /api/health response: $HEALTH"

          if [ "$SERVER_UP" = false ]; then
            echo "❌ Server failed to boot — no response on port 3000"
            exit 1
          fi

          # Server booted + routed a compiled API request = artifact is valid.
          # /api/health's own status (ok/degraded/unhealthy) is an infra
          # concern (no DB in CI), not a module-resolution concern.
          echo "✅ Smoke test passed — server boots and API routes are compiled"
